CameraSettings:
  tab: Kameraeinstellungen
FeatureSettings:
  title: Funktionen
  nightVision:
    title: Nachtsicht
    tooltip: Bei on Schwarz-Weiß-Nachtbild, bei off Farbbild, auto schaltet automatisch um
  nightCutThr:
    title: Umschaltzeitpunkt
    text:
      - Dunkel
      - Sehr dunkel
    tooltip: Helligkeitsstufe für die Nachtsicht-Umschaltung
  IrLED:
    title: Infrarotlicht
AlarmSettings:
  title: Erkennung
  motionDet:
    title: Bewegungserkennung
  Level:
    title: Empfindlichkeit
    text:
      - Hoch
      - Mittel
      - Niedrig
  motionArea:
    title: Erkennungsbereich
    text:
      - Gesamter Bereich
      - Ausgewählter Bereich
  soundDet:
    title: Geräuscherkennung
  cautionDet:
    title: Erkennung von Rauch-/CO-Melder-Alarmen
  drawBoxSwitch:
    title: Bewegungsmarkierung
    tooltip: Zeigt bei erkannter Bewegung einen grünen Rahmen um die Objekte
  recordType:
    title: Aufnahmemodus
    text:
      - Durchgehend
      - Bei Erkennung
      - Aus
OtherSettings:
  title: Sonstiges
  indicator:
    title: Statusleuchte
  rotate:
    title: Bild um 180° drehen
  audioRec:
    title: Ton aufnehmen
  timestamp:
    title: Zeitstempel
  watermark:
    title: Logo
AdvancedSettings:
  title: Erweiterte Einstellungen
  contrast:
    title: Kontrast
    tooltip: Passt den Unterschied zwischen Hell und Dunkel an. Höher wirkt kräftiger, niedriger weicher.
  brightness:
    title: Helligkeit
    tooltip: Passt die Gesamthelligkeit des Bildes an.
  saturation:
    title: Sättigung
    tooltip: Passt die Farbintensität an. Je niedriger, desto näher an Schwarz-Weiß.
  sharpness:
    title: Schärfe
    tooltip: Passt die Kantenschärfung an. Zu hohe Werte können Rauschen verstärken.
  sinter:
    title: 2D-NR intensity
    tooltip: Set 2D noise reduction intensity.
  temper:
    title: 3D-NR intensity
    tooltip: Set 3D noise reduction intensity.
  dpc:
    title: DPC Strength
    tooltip: Set DPC Strength.
  drc:
    title: DRC Strength
    tooltip: Set DRC Strength.
  hilight:
    title: highlight intensity
    tooltip: Set highlight intensity controls.
  again:
    title: Max Analog Gain
    tooltip: Sets the Max value of sensor analog gain.
  dgain:
    title: Max Digital Gain
    tooltip: Set the Max value of sensor Digital gain.
  expmode:
    title: Automatische Anpassung
    tooltip: Bei AUTO passt die Kamera die Belichtung automatisch an und die Regler zeigen die aktuellen Werte. Bei Manuell werden die Werte eingefroren und sind von Hand einstellbar.
    text:
      - AUTO
      - Manuell
  aecomp:
    title: AE compensation
    tooltip: Setting AE compensation.
  aeitmin:
    title: AE ITMin
    tooltip: The min value of integration time, the unit is line.
  aeitmax:
    title: AE ITMax
    tooltip: The max value of integration time, the unit is line.
  expline:
    title: Exposure line
    tooltip: Setting Exposure integration line.

SDCard:
  tab: SD-Karte
  remainingCapacity: Freier Speicher

record:
  tab: Aufnahme
  periodicRec:
    title: Daueraufnahme
  alarmRec:
    title: Aufnahme bei Bewegungserkennung
  SDCard:
    title: Aufnahme auf SD-Karte
    tooltip: Nimmt auf die SD-Karte auf
    savePath:
      title: Speicherpfad
      tooltip: Aufnahmepfad im strftime-Format angeben. Die Dateiendung wird automatisch angehängt
    automaticDeletion:
      title: Automatisches Löschen
      tooltip: Löscht Aufnahmen auf der SD-Karte automatisch
    daysToKeep:
      title: Aufbewahrungsdauer (Tage)
      tooltip: Nach der angegebenen Anzahl Tage werden sie gelöscht
  NAS:
    title: Aufnahme auf NAS
    tooltip: Nimmt auf ein NAS (CIFS-Server) auf
    savePath:
      title: Speicherpfad
      tooltip: Aufnahmepfad nach dem Netzwerkpfad im strftime-Format angeben. Die Dateiendung wird automatisch angehängt
    automaticDeletion:
      title: Automatisches Löschen
      tooltip: Löscht Aufnahmen auf dem NAS (CIFS-Server) automatisch
    daysToKeep:
      title: Aufbewahrungsdauer (Tage)
      tooltip: Nach der angegebenen Anzahl Tage werden sie gelöscht
  recordTypeWarn:
    comment: |
      Stellen Sie den Aufnahmemodus der Kamera auf Durchgehend oder Bei Erkennung. Bei Aus wird nichts aufgenommen.
  alarmRecWarn:
    comment: |
      Aktivieren Sie mindestens eine Erkennung (Bewegung, Geräusch oder Rauch-/CO-Melder) in den Kameraeinstellungen. Sind alle aus, wird nichts aufgenommen.
  recordingSchedule:
    title: Aufnahmezeitplan
    tooltip: Legt die Zeitfenster für Aufnahmen auf SD-Karte/NAS fest
    text:
      - Daueraufnahme
      - Zeitplan
  skipJpeg:
    title: JPEG-Aufzeichnung überspringen
    tooltip: Beendet das Schreiben von JPEG-Dateien in das record-Verzeichnis

timelapse:
  tab: Zeitraffer
  title: Zeitraffer
  setting:
    title: Abtasteinstellung
  note:
    comment: |
      Lassen Sie zwischen Zeitraffer-Aufnahmen mindestens 5 Minuten für die Nachbearbeitung.
      Bei Zeitüberschneidungen wird nichts aufgenommen. Vermeiden Sie Überschneidungen.
  start:
    title: Status
    tooltip: Zeitraffer läuft.
  stop:
    title: Abbrechen
    tooltip: Bricht den Zeitraffer ab.
    button: Abbrechen
    comment: 'Abbruch: Datei wird geschrieben'
  fps:
    title: Ausgabe-fps
    tooltip: Bildrate der Ausgabedatei

media:
  tab: Medien
SDCardSettings:
  title: SD-Karte
  smbAccess:
    title: smb-Zugriff
    tooltip: Gibt die SD-Karte als CIFS(smb)-Server im LAN frei
  directWrite:
    title: Direkt aufnehmen
    tooltip: Normalerweise wird zuerst auf die RAM-DISK aufgenommen und dann auf die SD-Karte kopiert; zum RAM-Sparen wird direkt auf die SD-Karte geschrieben
  eraseSDCard:
    title: SD-Karte löschen
    tooltip: Löscht die Aufnahmeordner auf der SD-Karte
    button: Löschen

