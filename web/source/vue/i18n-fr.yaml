camera:
  tab: Image de la caméra

CameraSettings:
  tab: Réglages caméra
FeatureSettings:
  title: Fonctions
  nightVision:
    title: Vision nocturne
    tooltip: Sur on, image nocturne en noir et blanc ; sur off, image en couleur ; auto bascule automatiquement
  nightCutThr:
    title: Seuil de bascule
    text:
      - Sombre
      - Très sombre
    tooltip: Niveau de luminosité déclenchant la vision nocturne
  IrLED:
    title: Éclairage infrarouge
AlarmSettings:
  title: Détection
  motionDet:
    title: Détection de mouvement
  Level:
    title: Sensibilité
    text:
      - Haute
      - Moyenne
      - Basse
  motionArea:
    title: Zone de détection
    text:
      - Toute la zone
      - Zone sélectionnée
  soundDet:
    title: Détection sonore
  cautionDet:
    title: Détection d'alarme incendie/CO
  drawBoxSwitch:
    title: Marquage de mouvement
    tooltip: Affiche un cadre vert sur les objets détectés
  recordType:
    title: Mode d'enregistrement
    text:
      - Continu
      - Sur détection
      - Désactivé
OtherSettings:
  title: Autres
  indicator:
    title: Voyant d'état
  rotate:
    title: Pivoter l'image de 180°
  audioRec:
    title: Enregistrer le son
  timestamp:
    title: Horodatage
  watermark:
    title: Logo
AdvancedSettings:
  title: Réglages avancés
  contrast:
    title: Contraste
    tooltip: Ajuste l'écart entre zones claires et sombres. Plus haut, l'image est plus marquée ; plus bas, plus douce.
  brightness:
    title: Luminosité
    tooltip: Ajuste la luminosité globale de l'image.
  saturation:
    title: Saturation
    tooltip: Ajuste l'intensité des couleurs. Plus bas, l'image se rapproche du noir et blanc.
  sharpness:
    title: Netteté
    tooltip: Ajuste l'accentuation des contours. Une valeur trop élevée peut amplifier le bruit.
  sinter:
    title: 2D-NR intensity
    tooltip: Set 2D noise reduction intensity.
  temper:
    title: 3D-NR intensity
    tooltip: Set 3D noise reduction intensity.
  dpc:
    title: DPC Strength
    tooltip: Set DPC Strength.
  drc:
    title: DRC Strength
    tooltip: Set DRC Strength.
  hilight:
    title: highlight intensity
    tooltip: Set highlight intensity controls.
  again:
    title: Max Analog Gain
    tooltip: Sets the Max value of sensor analog gain.
  dgain:
    title: Max Digital Gain
    tooltip: Set the Max value of sensor Digital gain.
  expmode:
    title: Réglage automatique
    tooltip: En AUTO, la caméra ajuste l'exposition automatiquement et les curseurs affichent les valeurs actuelles. En manuel, les valeurs sont figées et réglables à la main.
    text:
      - AUTO
      - Manuel
  aecomp:
    title: AE compensation
    tooltip: Setting AE compensation.
  aeitmin:
    title: AE ITMin
    tooltip: The min value of integration time, the unit is line.
  aeitmax:
    title: AE ITMax
    tooltip: The max value of integration time, the unit is line.
  expline:
    title: Exposure line
    tooltip: Setting Exposure integration line.

SDCard:
  tab: Carte SD
  remainingCapacity: Espace libre

record:
  tab: Enregistrement
  periodicRec:
    title: Enregistrement continu
  alarmRec:
    title: Enregistrement sur détection
  SDCard:
    title: Enregistrement sur carte SD
    tooltip: Enregistre sur la carte SD
    savePath:
      title: Chemin de sauvegarde
      tooltip: Indiquez le chemin d'enregistrement au format strftime. L'extension est ajoutée à la fin
    automaticDeletion:
      title: Suppression automatique
      tooltip: Supprime automatiquement les enregistrements de la carte SD
    daysToKeep:
      title: Durée de conservation (jours)
      tooltip: Supprimés après le nombre de jours indiqué
  NAS:
    title: Enregistrement sur NAS
    tooltip: Enregistre sur un NAS (serveur CIFS)
    savePath:
      title: Chemin de sauvegarde
      tooltip: Indiquez le chemin après le chemin réseau au format strftime. L'extension est ajoutée à la fin
    automaticDeletion:
      title: Suppression automatique
      tooltip: Supprime automatiquement les enregistrements du NAS (serveur CIFS)
    daysToKeep:
      title: Durée de conservation (jours)
      tooltip: Supprimés après le nombre de jours indiqué
  recordTypeWarn:
    comment: |
      Réglez le mode d'enregistrement de la caméra sur Continu ou Sur détection. S'il est désactivé, rien ne sera enregistré.
  alarmRecWarn:
    comment: |
      Activez au moins une des détections (mouvement, son, alarme incendie/CO) dans les réglages caméra. Si tout est désactivé, rien ne sera enregistré.
  recordingSchedule:
    title: Programme d'enregistrement
    tooltip: Définit les plages horaires d'enregistrement sur carte SD/NAS
    text:
      - Enregistrement permanent
      - Programme
  skipJpeg:
    title: Ignorer l'enregistrement JPEG
    tooltip: Cesse d'écrire des fichiers JPEG dans le répertoire record

timelapse:
  tab: Timelapse
  title: Timelapse
  setting:
    title: Réglage d'échantillonnage
  note:
    comment: |
      Laissez au moins 5 minutes entre deux timelapses pour le traitement après enregistrement.
      En cas de chevauchement horaire, rien ne sera enregistré. Configurez sans chevauchement.
  start:
    title: État
    tooltip: Timelapse en cours.
  stop:
    title: Arrêter
    tooltip: Interrompt le timelapse.
    button: Arrêter
    comment: 'Arrêt en cours : écriture du fichier'
  fps:
    title: fps de sortie
    tooltip: Fréquence d'images du fichier de sortie

media:
