SDCardSettings:
  title: Carte SD
  smbAccess:
    title: Accès smb
    tooltip: Partage la carte SD comme serveur CIFS (smb) sur le réseau local
  directWrite:
    title: Écriture directe
    tooltip: Normalement l'enregistrement passe par le RAM-DISK avant copie sur la carte SD ; pour économiser la RAM, écrit directement sur la carte SD
  eraseSDCard:
    title: Effacer la carte SD
    tooltip: Efface les dossiers d'enregistrement de la carte SD
    button: Effacer

