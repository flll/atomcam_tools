  ping:
    title: ping
    tooltip: 지정한 URL로 상태를 확인할 수 있게 합니다
  URL:
    title: 알림 URL
    tooltip: 지정한 URL로 1분마다 http get을 보냅니다

update:
  title: Update
  toolsUpdate:
    title: Update
    tooltip: atomcam tools를 업데이트합니다
  customZip:
    title: 커스텀 업데이트 ZIP 파일
    tooltip: 로컬에서 커스텀 업데이트 ZIP을 만들어 사용할 수 있습니다
    URL:
      title: URL
      tooltip: 커스텀 업데이트 ZIP 파일의 다운로드 URL을 지정합니다

reboot:
  title: 재부팅
  periodicRestart:
    title: 정기 재시작
    tooltip: 정기적으로 재부팅하도록 설정합니다
